<style>
        :root { --primary: #ff6154; --dark: #0b0e14; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--dark); color: white; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 100px; }
        nav { padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass); }
        .logo { font-weight: 900; letter-spacing: -1px; font-size: 1.2rem; color: #fff; }
        .logo span { color: var(--primary); }
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        
        /* Card Layout - Biar nggak gepeng di HP */
        .launch-card { background: var(--glass); border: 1px solid #2d313f; border-radius: 16px; padding: 25px; display: flex; gap: 20px; align-items: center; position: relative; flex-wrap: wrap; }
        .product-icon { width: 80px; height: 80px; background: linear-gradient(135deg, #00f2ff, #004a99); border-radius: 20px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 900; }
        
        .content h1 { margin: 0; font-size: 1.8rem; font-weight: 900; }
        .tagline { color: #8a99a8; font-size: 1rem; margin: 10px 0; }
        .tags { display: flex; gap: 8px; flex-wrap: wrap; }
        .tag { background: #1e222d; padding: 4px 10px; border-radius: 6px; font-size: 0.65rem; color: #cbd5e1; border: 1px solid #334155; text-transform: uppercase; }
        
        .desc-section { margin-top: 30px; line-height: 1.6; color: #cbd5e1; font-size: 1rem; }
        .highlight { color: #fff; font-weight: 600; border-bottom: 2px solid var(--primary); }
        
        /* Grid Stats - INI YANG DIBENERIN */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .stat-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; border: 1px solid #334155; }
        
        /* Roadmap */
        .roadmap-grid { display: flex; justify-content: space-between; margin-top: 30px; gap: 15px; }
        .roadmap-item { width: 33%; }

        /* JURUS SAKTI BUAT HP */
        @media (max-width: 600px) {
            .stats-grid, .roadmap-grid { grid-template-columns: 1fr; display: flex; flex-direction: column; }
            .roadmap-item { width: 100%; margin-bottom: 20px; }
            .launch-card { flex-direction: column; text-align: center; justify-content: center; }
            .product-icon { margin: 0 auto; }
            .upvote-btn { width: 100%; margin-top: 10px; }
        }

        .upvote-btn { border: 1px solid #334155; border-radius: 12px; padding: 10px 20px; cursor: pointer; display: flex; flex-direction: column; align-items: center; background: transparent; color: white; }
        .cta-box { margin-top: 50px; background: rgba(255,255,255,0.02); padding: 30px; border-radius: 16px; text-align: center; border: 1px dashed #475569; }
        .btn-main { background: var(--primary); color: white; padding: 15px 30px; border-radius: 8px; text-decoration: none; font-weight: 700; display: inline-block; width: 80%; }
    </style>
